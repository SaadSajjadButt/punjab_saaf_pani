{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ACMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --primary-color: #7b8fa1;
            --secondary-color: #5a6c7d;
            --accent-color: #4a5d6a;
            --dark-color: #2c3e50;
            --text-color: #ffffff;
            --muted-text: rgba(255, 255, 255, 0.6);
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, var(--dark-color), #34495e);
            min-height: 100vh;
            color: white;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            height: 55px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.15);
            box-shadow: none;
            border: 1px solid var(--primary-color);
        }

        .btn-login {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
        }

        .alert {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
    <div class="login-card text-center">

        <!-- Logo -->
        <img src="{% static 'images/logo.png' %}" width="100" class="mb-3">

        <h3>ACMS</h3>
        <p class="text-muted">Access your account</p>

        <!-- Django Messages -->
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if account_deactivation %}
            <div class="alert alert-danger">{{ account_deactivation }}</div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="{% url 'login' %}" id="loginForm">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="login" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-login w-100" id="loginButton">
                Login
            </button>
        </form>

    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
particlesJS('particles-js', {
    particles: {
        number: { value: 70 },
        color: { value: "#ffffff" },
        size: { value: 3 },
        move: { speed: 2 }
    }
});

// Button loading effect
document.getElementById('loginForm').addEventListener('submit', function(){
    let btn = document.getElementById('loginButton');
    btn.innerText = "Logging in...";
});
</script>

</body>
</html>
