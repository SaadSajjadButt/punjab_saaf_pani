{% extends "ticket/main.html" %}

{% block content %}
<div class="container-fluid">

  <!-- Page Title -->
  <div class="page-title-box d-flex justify-content-between align-items-center">
    <h4 class="page-title"><i class="ri-key-line me-1"></i> Password Reset</h4>
  </div>

  <!-- Password Reset Card -->
  <div class="card">
    <div class="card-header bg-primary text-white d-flex align-items-center justify-content-between">
      <h5 class="card-title mb-0">Change Your Password</h5>
    </div>

    <div class="card-body">

      <!-- Alerts -->
      {% if success %}
      <div class="alert alert-success text-center" id="entry_success">
        Password Reset Successfully
      </div>
      {% endif %}

      {% if missmatch %}
      <div class="alert alert-danger text-center" id="entry_failure">
        Password Mismatch
      </div>
      {% endif %}

      {% if incorrect %}
      <div class="alert alert-danger text-center" id="old_password_id">
        Incorrect Old Password
      </div>
      {% endif %}

      <!-- Form -->
      <form action="{% url 'password_reset' %}" method="POST" autocomplete="off">
        {% csrf_token %}
        <div class="row g-3 align-items-end">

          <div class="col-md-3">
            <label class="form-label">Old Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="old_password" name="old_password" required>
              <span class="input-group-text"><i class="ri-lock-line"></i></span>
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password1" name="password1" required>
              <span class="input-group-text"><i class="ri-lock-password-line"></i></span>
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Repeat Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password2" name="password2" required>
              <span class="input-group-text"><i class="ri-lock-password-line"></i></span>
            </div>
          </div>

          <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">
              <i class="ri-refresh-line me-1"></i> Reset
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>

<!-- Script -->
<script type="text/javascript">
  $("#entry_success, #entry_failure, #old_password_id").delay(3000).fadeOut();
</script>
{% endblock %}
